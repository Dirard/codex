name: manual-windows-codex-build

on:
  workflow_dispatch:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 120

    defaults:
      run:
        working-directory: codex-rs

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build codex.exe
        shell: bash
        run: cargo build --release --target x86_64-pc-windows-msvc -p codex-cli --bin codex

      - name: Upload codex.exe
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-windows-x64
          path: codex-rs/target/x86_64-pc-windows-msvc/release/codex.exe
