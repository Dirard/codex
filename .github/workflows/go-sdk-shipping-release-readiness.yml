name: go-sdk-shipping-release-readiness

on:
  workflow_call:
    inputs:
      checkout_ref:
        required: true
        type: string
      evidence_source:
        required: false
        type: string
        default: ci-preflight
      verification_job:
        required: false
        type: string
        default: ""
      verification_conclusion:
        required: false
        type: string
        default: ""
      verification_commit_sha:
        required: false
        type: string
        default: ""

jobs:
  shipping-linux-release-readiness:
    name: Shipping Linux release-readiness evidence
    runs-on:
      group: ${{ github.event.repository.name }}-runners
      labels: ${{ github.event.repository.name }}-linux-x64
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Validate evidence source
        env:
          EVIDENCE_SOURCE: ${{ inputs.evidence_source }}
        run: |
          set -euo pipefail
          case "$EVIDENCE_SOURCE" in
            ci-preflight|rust-release) ;;
            *)
              echo "Unsupported Linux release evidence source: $EVIDENCE_SOURCE" >&2
              exit 1
              ;;
          esac

      - name: Record CI preflight as not release-ready
        if: ${{ inputs.evidence_source == 'ci-preflight' }}
        run: |
          set -euo pipefail
          python3 .github/scripts/go_sdk_shipping_release_readiness.py \
            source-preflight \
            --out shipping-release-readiness-metadata

      - name: Download actual Rust release Linux artifacts
        if: ${{ inputs.evidence_source == 'rust-release' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "{x86_64,aarch64}-unknown-linux-musl{,-app-server}"
          path: downloaded-rust-release-artifacts

      - name: Rebuild checksum manifest from downloaded release artifacts
        if: ${{ inputs.evidence_source == 'rust-release' }}
        run: |
          set -euo pipefail
          bash .github/scripts/write-codex-package-checksums.sh \
            --dist downloaded-rust-release-artifacts \
            --manifest downloaded-rust-release-artifacts/codex-package_SHA256SUMS

      - name: Collect actual Rust release Linux readiness metadata
        if: ${{ inputs.evidence_source == 'rust-release' }}
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          VERIFICATION_COMMIT_SHA: ${{ inputs.verification_commit_sha }}
          VERIFICATION_CONCLUSION: ${{ inputs.verification_conclusion }}
          VERIFICATION_JOB: ${{ inputs.verification_job }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          commit_sha="$(git rev-parse HEAD)"
          python3 .github/scripts/go_sdk_shipping_release_readiness.py \
            collect-linux-release \
            --artifacts-dir downloaded-rust-release-artifacts \
            --out shipping-release-readiness-metadata \
            --run-id "$WORKFLOW_RUN_ID" \
            --run-attempt "$WORKFLOW_RUN_ATTEMPT" \
            --commit-sha "$commit_sha" \
            --release-tag "$RELEASE_TAG" \
            --verification-job "$VERIFICATION_JOB" \
            --verification-conclusion "$VERIFICATION_CONCLUSION" \
            --verification-commit-sha "$VERIFICATION_COMMIT_SHA"

      - name: Upload Linux shipping release-readiness metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: shipping-release-readiness-metadata
          path: shipping-release-readiness-metadata/
          if-no-files-found: error
