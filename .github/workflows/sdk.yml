name: sdk

on:
  workflow_call:

jobs:
  python-sdk:
    runs-on:
      group: ${{ github.event.repository.name }}-runners
      labels: ${{ github.event.repository.name }}-linux-x64
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Test Python SDK
        shell: bash
        run: |
          set -euo pipefail

          # Run inside a glibc Linux image so dependency resolution exercises
          # the pinned manylinux runtime wheel that users install.
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/codex-python-sdk-home \
            -e UV_LINK_MODE=copy \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}/sdk/python" \
            python:3.12-slim \
            sh -euxc '
              python -m venv /tmp/uv
              /tmp/uv/bin/python -m pip install uv==0.11.3
              /tmp/uv/bin/uv sync --group dev --frozen
              /tmp/uv/bin/uv run --frozen --no-sync ruff check --output-format=github .
              /tmp/uv/bin/uv run --frozen --no-sync ruff format --check .
              /tmp/uv/bin/uv run --frozen --no-sync pytest
            '

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree

  sdks:
    runs-on:
      group: ${{ github.event.repository.name }}-runners
      labels: ${{ github.event.repository.name }}-linux-x64
    timeout-minutes: 10
    environment:
      name: bazel
      deployment: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Install Linux bwrap build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Bazel CI
        id: setup_bazel
        uses: ./.github/actions/setup-bazel-ci
        with:
          target: x86_64-unknown-linux-gnu

      - name: Build codex with Bazel
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          # Use the shared CI wrapper so fork PRs fall back cleanly when
          # BuildBuddy credentials are unavailable. This workflow needs the
          # built `codex` binary on disk afterwards, so ask the wrapper to
          # override CI's default remote_download_minimal behavior.
          ./.github/scripts/run-bazel-ci.sh \
            --remote-download-toplevel \
            -- \
            build \
            --build_metadata=COMMIT_SHA=${GITHUB_SHA} \
            --build_metadata=TAG_job=sdk \
            -- \
            //codex-rs/cli:codex

          # Resolve the exact output file using the same wrapper/config path as
          # the build instead of guessing which Bazel convenience symlink is
          # available on the runner.
          cquery_output="$(
            ./.github/scripts/run-bazel-ci.sh \
              -- \
              cquery \
              --output=files \
              -- \
              //codex-rs/cli:codex \
              | grep -E '^(/|bazel-out/)' \
              | tail -n 1
          )"
          if [[ "${cquery_output}" = /* ]]; then
            codex_bazel_output_path="${cquery_output}"
          else
            codex_bazel_output_path="${GITHUB_WORKSPACE}/${cquery_output}"
          fi
          if [[ -z "${codex_bazel_output_path}" ]]; then
            echo "Bazel did not report an output path for //codex-rs/cli:codex." >&2
            exit 1
          fi
          if [[ ! -e "${codex_bazel_output_path}" ]]; then
            echo "Unable to locate the Bazel-built codex binary at ${codex_bazel_output_path}." >&2
            exit 1
          fi

          # Stage the binary into the workspace and point the SDK tests at that
          # stable path. The tests spawn `codex` directly many times, so using a
          # normal executable path is more reliable than invoking Bazel for each
          # test process.
          install_dir="${GITHUB_WORKSPACE}/.tmp/sdk-ci"
          mkdir -p "${install_dir}"
          install -m 755 "${codex_bazel_output_path}" "${install_dir}/codex"
          echo "CODEX_EXEC_PATH=${install_dir}/codex" >> "$GITHUB_ENV"

      - name: Warm up Bazel-built codex
        shell: bash
        run: |
          set -euo pipefail
          "${CODEX_EXEC_PATH}" --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK packages
        run: pnpm -r --filter ./sdk/typescript run build

      - name: Lint SDK packages
        run: pnpm -r --filter ./sdk/typescript run lint

      - name: Test SDK packages
        run: pnpm -r --filter ./sdk/typescript run test

      - name: Save bazel repository cache
        if: always() && !cancelled() && steps.setup_bazel.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.setup_bazel.outputs.repository-cache-path }}
          key: bazel-cache-x86_64-unknown-linux-gnu-${{ hashFiles('MODULE.bazel', 'codex-rs/Cargo.lock', 'codex-rs/Cargo.toml') }}

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree

  go-sdk:
    name: Go SDK - ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90
    environment:
      name: bazel
      deployment: false
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-musl
            bazel_target: x86_64-unknown-linux-musl
            runs_on:
              group: ${{ github.event.repository.name }}-runners
              labels: ${{ github.event.repository.name }}-linux-x64-xl
            runner_label: ${{ github.event.repository.name }}-linux-x64-xl
            sandbox: true
            package_archive: true
          - name: linux-arm64-musl
            bazel_target: aarch64-unknown-linux-musl
            runs_on:
              group: ${{ github.event.repository.name }}-runners
              labels: ${{ github.event.repository.name }}-linux-arm64
            runner_label: ${{ github.event.repository.name }}-linux-arm64
            sandbox: true
            package_archive: true
          - name: macos-arm64
            bazel_target: aarch64-apple-darwin
            runs_on: macos-15-xlarge
            runner_label: macos-15-xlarge
            package_archive: true
          - name: macos-x64
            bazel_target: x86_64-apple-darwin
            runs_on: macos-15-large
            runner_label: macos-15-large
            package_archive: true
          - name: windows
            bazel_target: x86_64-pc-windows-msvc
            runs_on:
              group: ${{ github.event.repository.name }}-runners
              labels: ${{ github.event.repository.name }}-windows-x64
            runner_label: ${{ github.event.repository.name }}-windows-x64
            package_archive: true
            release_shape: true
          - name: windows-arm64
            bazel_target: aarch64-pc-windows-msvc
            runs_on:
              group: ${{ github.event.repository.name }}-runners
              labels: ${{ github.event.repository.name }}-windows-arm64
            runner_label: ${{ github.event.repository.name }}-windows-arm64
            package_archive: true
            release_shape: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Bazel CI
        id: setup_bazel
        uses: ./.github/actions/setup-bazel-ci
        with:
          target: ${{ matrix.bazel_target }}

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25"
          cache-dependency-path: |
            sdk/go/go.mod
            sdk/go/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.bazel_target }}

      - name: Configure LLVM linker
        if: ${{ runner.os == 'Windows' }}
        uses: ./.github/actions/setup-msvc-env
        with:
          target: ${{ matrix.bazel_target }}

      - name: Install Rust helpers
        uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2.62.49
        with:
          tool: just,nextest@0.9.103

      - name: Install Linux bwrap build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends bubblewrap pkg-config libcap-dev

      - name: Install Zig
        if: ${{ runner.os == 'Linux' }}
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0
          use-cache: false

      - name: Install musl build tools
        if: ${{ runner.os == 'Linux' }}
        env:
          TARGET: ${{ matrix.bazel_target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Disable aws-lc jitter entropy (musl)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.bazel_target }}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"

      - name: Assert macOS x64 runner architecture
        if: ${{ matrix.bazel_target == 'x86_64-apple-darwin' }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -m)" = "x86_64"

      - name: Configure rusty_v8 artifact overrides and verify checksums
        uses: ./.github/actions/setup-rusty-v8
        with:
          target: ${{ matrix.bazel_target }}

      - name: Materialize package helper root
        shell: bash
        env:
          TARGET: ${{ matrix.bazel_target }}
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/codex-rs"
          helper_args=(
            --target "$TARGET"
            --output-root "${RUNNER_TEMP}/codex-package-helpers"
          )
          case "$TARGET" in
            *linux*)
              cargo build --target "$TARGET" --release --timings --bin bwrap
              bwrap_path="target/${TARGET}/release/bwrap"
              if [[ ! -f "$bwrap_path" ]]; then
                echo "bwrap binary ${bwrap_path} not found" >&2
                exit 1
              fi
              strip --strip-debug --strip-unneeded "$bwrap_path"
              helper_args+=(--bwrap-bin "$bwrap_path")
              ;;
            *windows*)
              cargo build --target "$TARGET" --release --timings --bin codex-command-runner --bin codex-windows-sandbox-setup
              helper_args+=(
                --codex-command-runner-bin "target/${TARGET}/release/codex-command-runner.exe"
                --codex-windows-sandbox-setup-bin "target/${TARGET}/release/codex-windows-sandbox-setup.exe"
              )
              ;;
          esac

          CODEX_PACKAGE_HELPER_ROOT="${RUNNER_TEMP}/codex-package-helpers"
          rm -rf "${CODEX_PACKAGE_HELPER_ROOT}/${TARGET}"
          PYTHONPATH="${GITHUB_WORKSPACE}/scripts" python3 -m codex_package.materialize_helpers "${helper_args[@]}"
          PYTHONPATH="${GITHUB_WORKSPACE}/scripts" python3 -m codex_package.materialize_helpers \
            --target "$TARGET" \
            --output-root "$CODEX_PACKAGE_HELPER_ROOT" \
            --verify-only
          echo "CODEX_GO_SDK_HELPER_ROOT_SOURCE=producer-mode-blocked" >> "$GITHUB_ENV"
          echo "CODEX_PACKAGE_HELPER_ROOT=$CODEX_PACKAGE_HELPER_ROOT" >> "$GITHUB_ENV"

      - name: Stage Go SDK runtime
        shell: bash
        run: |
          set -euo pipefail
          stage_args=(
            --out "${RUNNER_TEMP}/codex-go-sdk-runtime"
            --bazel-target "${{ matrix.bazel_target }}"
            --cargo-profile dev
            --build-metadata-job go-sdk
            --github-env "${GITHUB_ENV}"
          )
          if [[ "${{ matrix.release_shape || false }}" == "true" ]]; then
            stage_args+=(--windows-release-shaped-msvc --windows-msvc-host-platform)
          fi
          .github/scripts/stage-codex-runtime.sh "${stage_args[@]}"

      - name: Warm up staged runtime
        shell: bash
        run: |
          set -euo pipefail
          "${CODEX_EXEC_PATH:?}" --version

      - name: Test Go SDK against real app-server
        shell: bash
        env:
          CODEX_GO_SDK_REQUIRE_REAL_APP_SERVER: "1"
        run: |
          set -euo pipefail
          cd sdk/go
          required_tests=(
            TestRealAppServerInitializeStrictDigest
            TestRealAppServerRejectsDebugHookEnv
            TestRealAppServerDigestMismatch
            TestRealAppServerCompatibilityOverridePolicy
            TestRealAppServerThreadRunHappyPath
            TestRealAppServerConfigReadWrite
            TestRealAppServerFilesystemWatch
            TestRealAppServerCommandExecStreaming
            TestRealAppServerProcessLifecycle
            TestRealAppServerSafeResourceWorkflows
            TestRealAppServerRemoteControlWorkflow
            TestRealAppServerModelList
            TestRealAppServerProtocolModeExperimentalGate
            TestRealAppServerUnauthenticatedAccountRead
          )
          go test ./... -list 'TestRealAppServer|TestDigestMismatch|TestCompatibilityOverridePolicy' | tee "${RUNNER_TEMP}/go-sdk-real-tests.txt"
          for test_name in "${required_tests[@]}"; do
            if ! grep -qx "$test_name" "${RUNNER_TEMP}/go-sdk-real-tests.txt"; then
              echo "Missing required Go SDK real app-server test: ${test_name}" >&2
              exit 1
            fi
            go test ./... -run "^${test_name}$"
          done
          if [[ "${{ matrix.sandbox || false }}" == "true" ]]; then
            "${GITHUB_WORKSPACE}/.github/scripts/stage-codex-runtime.sh" \
              --verify-sandbox \
              --exec-path "${CODEX_EXEC_PATH:?}"
          fi
          go test ./...

      - name: Race-test Go SDK
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          cd sdk/go
          go test -race ./...

      - name: Test Go SDK release archive runtime
        if: ${{ matrix.package_archive }}
        shell: bash
        env:
          CODEX_GO_SDK_REQUIRE_REAL_APP_SERVER: "1"
        run: |
          set -euo pipefail
          zstd_args=()
          if [[ -n "${CODEX_GO_SDK_ZSTD_SOURCE:-}" ]]; then
            if [[ ! -x "${CODEX_GO_SDK_ZSTD_SOURCE}" ]]; then
              echo "CODEX_GO_SDK_ZSTD_SOURCE must point at the Stage 5G materialized zstd executable" >&2
              exit 1
            fi
            zstd_args+=(--zstd-source "${CODEX_GO_SDK_ZSTD_SOURCE}")
          else
            zstd_bin="$(command -v zstd || true)"
            if [[ -z "$zstd_bin" ]]; then
              echo "zstd is required for Go SDK release-archive validation unless CODEX_GO_SDK_ZSTD_SOURCE points at the Stage 5G no-network source; DotSlash fallback is not accepted" >&2
              exit 1
            fi
            zstd_realpath="$(cd "$(dirname "$zstd_bin")" && pwd -P)/$(basename "$zstd_bin")"
            repo_zstd_dir="${GITHUB_WORKSPACE}/.github/workflows"
            repo_zstd="${repo_zstd_dir}/zstd"
            if [[ "$zstd_realpath" == "$repo_zstd" ]]; then
              echo "Repo DotSlash zstd is not accepted for Go SDK package archive validation: $zstd_realpath" >&2
              exit 1
            fi
          fi
          release_shape_args=()
          if [[ "${{ matrix.release_shape || false }}" == "true" ]]; then
            release_shape_args+=(--windows-release-shaped-msvc --windows-msvc-host-platform)
          fi
          stage_output="$(
            .github/scripts/stage-codex-runtime.sh \
              --out "${RUNNER_TEMP}/codex-go-sdk-release-runtime" \
              --bazel-target "${{ matrix.bazel_target }}" \
              --cargo-profile release \
              --build-metadata-job go-sdk-release-archive \
              --release-package-archive \
              --print-shell-env \
              "${zstd_args[@]}" \
              "${release_shape_args[@]}"
          )"
          eval "$stage_output"
          unset CODEX_HOME
          unset CODEX_APP_SERVER_DISABLE_MANAGED_CONFIG
          unset CODEX_APP_SERVER_MANAGED_CONFIG_PATH
          unset CODEX_APP_SERVER_SDK_INTEGRATION_TEST_MODE
          unset CODEX_APP_SERVER_AUTH_BASE_URL_FOR_TESTS
          unset CODEX_APP_SERVER_LOGIN_ISSUER
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata_path = Path(os.environ["CODEX_RUNTIME_METADATA_PATH"])
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          if metadata.get("runtimeSource") != "packageArchive":
              raise SystemExit(f"expected packageArchive runtime, got {metadata.get('runtimeSource')!r}")
          if metadata.get("cargoProfile") != "release":
              raise SystemExit(f"expected release cargoProfile, got {metadata.get('cargoProfile')!r}")
          archive = metadata.get("packageArchive") or {}
          if archive.get("target") != "${{ matrix.bazel_target }}":
              raise SystemExit(f"unexpected package archive target: {archive.get('target')!r}")
          if not str(archive.get("path", "")).endswith((".tar.zst", ".zip", ".dmg")):
              raise SystemExit(f"unexpected package archive path: {archive.get('path')!r}")
          if metadata.get("bazelTarget") != "${{ matrix.bazel_target }}":
              raise SystemExit(f"unexpected metadata bazelTarget: {metadata.get('bazelTarget')!r}")
          if "tar.zst" not in metadata.get("archiveFormats", []):
              raise SystemExit(f"metadata archiveFormats missing tar.zst: {metadata.get('archiveFormats')!r}")
          target = "${{ matrix.bazel_target }}"
          helper_files = set((metadata.get("helperManifest") or {}).get("files") or [])
          required_helpers = {"rg.exe" if "windows" in target else "rg"}
          if "windows" not in target:
              required_helpers.add("zsh")
          if "linux" in target:
              required_helpers.add("bwrap")
          if "windows" in target:
              required_helpers.update({"codex-command-runner.exe", "codex-windows-sandbox-setup.exe"})
          missing = sorted(required_helpers - helper_files)
          if missing:
              raise SystemExit(f"helper manifest missing {missing}")
          if "${{ matrix.release_shape || false }}" == "true" and not archive.get("windowsReleaseShapedMsvc"):
              raise SystemExit("Windows package archive did not record release-shaped MSVC layout")
          PY
          cd sdk/go
          smoke_tests=(
            TestRealAppServerInitializeStrictDigest
            TestRealAppServerRejectsDebugHookEnv
            TestRealAppServerThreadRunHappyPath
            TestRealAppServerCommandExecStreaming
            TestRealAppServerProcessLifecycle
            TestRealAppServerFilesystemWatch
          )
          ran_smoke_tests=()
          for test_name in "${smoke_tests[@]}"
          do
            go test ./... -list "^${test_name}$" | grep -Fx "$test_name"
            go test ./... -run "^${test_name}$"
            ran_smoke_tests+=("$test_name")
          done

          evidence_dir="${RUNNER_TEMP}/go-sdk-ci-release-evidence-${{ matrix.bazel_target }}"
          mkdir -p "$evidence_dir"
          cp "${CODEX_RUNTIME_METADATA_PATH:?}" "$evidence_dir/staging-metadata.json"
          printf '%s\n' "${ran_smoke_tests[@]}" > "$evidence_dir/package-archive-smoke-tests.txt"
          {
            printf 'step=Test Go SDK release archive runtime\n'
            printf 'bounded=true\n'
            printf 'target=%s\n' "${{ matrix.bazel_target }}"
            printf 'runtimeSource=packageArchive\n'
            printf 'cargoProfile=release\n'
          } > "$evidence_dir/release-archive-smoke.log"
          uname -m > "$evidence_dir/uname-machine.txt" 2>/dev/null || printf 'unknown\n' > "$evidence_dir/uname-machine.txt"
          export GO_SDK_EVIDENCE_DIR="$evidence_dir"
          export GO_SDK_MATRIX_NAME="${{ matrix.name }}"
          export GO_SDK_RELEASE_SHAPE="${{ matrix.release_shape || false }}"
          export GO_SDK_RUNNER_LABEL="${{ matrix.runner_label }}"
          export GO_SDK_TARGET="${{ matrix.bazel_target }}"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_dir = Path(os.environ["GO_SDK_EVIDENCE_DIR"])
          target = os.environ["GO_SDK_TARGET"]
          runner_label = os.environ["GO_SDK_RUNNER_LABEL"]
          helper_root_source = os.environ.get("CODEX_GO_SDK_HELPER_ROOT_SOURCE", "")
          metadata_path = evidence_dir / "staging-metadata.json"
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          smoke_tests = (evidence_dir / "package-archive-smoke-tests.txt").read_text(encoding="utf-8").splitlines()
          architecture_proof_path = evidence_dir / "architecture-proof.json"
          architecture_proof = {
              "command": "uname -m",
              "runnerLabel": runner_label,
              "unameMachine": (evidence_dir / "uname-machine.txt").read_text(encoding="utf-8").strip(),
          }
          architecture_proof_path.write_text(json.dumps(architecture_proof, indent=2, sort_keys=True) + "\n", encoding="utf-8")

          package_archive = metadata.get("packageArchive") or {}
          evidence = {
              "architectureProof": architecture_proof,
              "architectureProofPath": architecture_proof_path.name,
              "bazelTarget": target,
              "boundedLogs": [
                  {
                      "path": "release-archive-smoke.log",
                      "maxBytes": 4096,
                      "redaction": "none-required",
                      "retention": "artifact",
                  }
              ],
              "cargoProfile": metadata.get("cargoProfile"),
              "jobConclusion": "success",
              "jobName": f"Go SDK - {os.environ['GO_SDK_MATRIX_NAME']}",
              "packageArchiveSmokeTests": smoke_tests,
              "packageArchiveVerifier": "success",
              "runnerLabel": runner_label,
              "runtimeSource": metadata.get("runtimeSource"),
              "stagingMetadata": metadata,
          }
          if helper_root_source == "producer-mode-blocked":
              evidence["helperRootEvidence"] = {
                  "source": "producerModeMaterializeHelpers",
                  "releaseReadinessImpact": (
                      "release readiness is blocked until Go SDK CI consumes a "
                      "pre-produced Stage 5G helper-root artifact and runs "
                      "materialize_helpers --verify-only on that artifact"
                  ),
              }
              evidence["notReleaseReady"] = True
              evidence["releaseReadinessImpact"] = evidence["helperRootEvidence"]["releaseReadinessImpact"]
          if "windows" in target:
              windows_host_proof = {
                  "target": target,
                  "windowsMsvcHostPlatform": bool(package_archive.get("windowsMsvcHostPlatform")),
                  "windowsReleaseShapedMsvc": bool(package_archive.get("windowsReleaseShapedMsvc")),
              }
              windows_host_proof_path = evidence_dir / "windows-host-proof.txt"
              windows_host_proof_path.write_text(
                  "\n".join(
                      [
                          f"target={target}",
                          f"windowsReleaseShapedMsvc={str(windows_host_proof['windowsReleaseShapedMsvc']).lower()}",
                          f"windowsMsvcHostPlatform={str(windows_host_proof['windowsMsvcHostPlatform']).lower()}",
                          "",
                      ]
                  ),
                  encoding="utf-8",
              )
              evidence["windowsHostProofPath"] = windows_host_proof_path.name
              evidence.update(windows_host_proof)
          (evidence_dir / "target-evidence.json").write_text(json.dumps(evidence, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Upload Go SDK CI target release evidence
        if: ${{ matrix.package_archive }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-sdk-ci-release-evidence-${{ matrix.bazel_target }}
          path: ${{ runner.temp }}/go-sdk-ci-release-evidence-${{ matrix.bazel_target }}/*
          if-no-files-found: error

      - name: Check Rust protocol schema drift
        shell: bash
        run: |
          set -euo pipefail
          cd codex-rs
          just write-app-server-schema --check
          cargo run --manifest-path Cargo.toml -p codex-app-server-protocol --bin write_schema_fixtures -- \
            --experimental \
            --check \
            --schema-root ../sdk/go/internal/protocodex/schema-experimental
          just test -p codex-app-server-protocol
          "${GITHUB_WORKSPACE}/.github/scripts/run-bazel-ci.sh" -- test //codex-rs/app-server-protocol:app-server-protocol

      - name: Check Go SDK generated protocol drift
        shell: bash
        run: |
          set -euo pipefail
          cd sdk/go
          go run ./internal/cmd/protocodex --check --mode stable \
            --stable-schema-root ../../codex-rs/app-server-protocol/schema \
            --experimental-schema-root internal/protocodex/schema-experimental \
            --manifest internal/protocodex/manifest/app_server_protocol_manifest.json
          go run ./internal/cmd/protocodex --check --mode experimental \
            --stable-schema-root ../../codex-rs/app-server-protocol/schema \
            --experimental-schema-root internal/protocodex/schema-experimental \
            --manifest internal/protocodex/manifest/app_server_protocol_manifest.json
          go run ./internal/cmd/protocodex --check --mode both \
            --stable-schema-root ../../codex-rs/app-server-protocol/schema \
            --experimental-schema-root internal/protocodex/schema-experimental \
            --manifest internal/protocodex/manifest/app_server_protocol_manifest.json \
            --out protocol \
            --root-out .
          go test ./... -run 'TestResourceCoverage|TestResourceDocsCoverage|TestServerHandlerDocsCoverage'

      - name: Save bazel repository cache
        if: always() && !cancelled() && steps.setup_bazel.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/bazel-repo-cache
          key: bazel-cache-${{ matrix.bazel_target }}-${{ hashFiles('MODULE.bazel', 'codex-rs/Cargo.lock', 'codex-rs/Cargo.toml') }}

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree

  go-sdk-ci-release-evidence:
    needs:
      - go-sdk
    runs-on:
      group: ${{ github.event.repository.name }}-runners
      labels: ${{ github.event.repository.name }}-linux-x64
    permissions:
      contents: read
    steps:
      - name: Download Go SDK target evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: go-sdk-ci-release-evidence-*
          path: downloaded-go-sdk-ci-release-evidence

      - name: Aggregate Go SDK CI release evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import shutil
          from pathlib import Path

          expected_targets = {
              "x86_64-unknown-linux-musl",
              "aarch64-unknown-linux-musl",
              "aarch64-apple-darwin",
              "x86_64-apple-darwin",
              "x86_64-pc-windows-msvc",
              "aarch64-pc-windows-msvc",
          }
          output_dir = Path("go-sdk-ci-release-evidence")
          if output_dir.exists():
              shutil.rmtree(output_dir)
          target_output_root = output_dir / "targets"
          target_output_root.mkdir(parents=True)
          targets = {}
          for evidence_path in Path("downloaded-go-sdk-ci-release-evidence").glob("**/target-evidence.json"):
              evidence = json.loads(evidence_path.read_text(encoding="utf-8"))
              target = evidence.get("bazelTarget")
              if target not in expected_targets:
                  raise SystemExit(f"unexpected Go SDK CI evidence target {target!r}")
              if target in targets:
                  raise SystemExit(f"duplicate Go SDK CI evidence for {target}")
              if evidence.get("jobConclusion") != "success":
                  raise SystemExit(f"Go SDK CI evidence for {target} did not record success")
              if "skipped" in evidence or "notReleaseReady" in evidence:
                  raise SystemExit(f"Go SDK CI evidence for {target} must not contain skipped/notReleaseReady markers")
              target_dir = target_output_root / target
              target_dir.mkdir()
              for source in evidence_path.parent.iterdir():
                  if source.is_file():
                      shutil.copy2(source, target_dir / source.name)
              for field in ["architectureProofPath", "windowsHostProofPath"]:
                  if evidence.get(field):
                      evidence[field] = f"targets/{target}/{Path(evidence[field]).name}"
              for log in evidence.get("boundedLogs") or []:
                  log["path"] = f"targets/{target}/{Path(log['path']).name}"
              targets[target] = evidence
          if set(targets) != expected_targets:
              raise SystemExit(f"Go SDK CI evidence targets {sorted(targets)} did not match {sorted(expected_targets)}")
          (output_dir / "go-sdk-ci-release-evidence.json").write_text(
              json.dumps({"targets": targets}, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload Go SDK CI release evidence
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-sdk-ci-release-evidence
          path: go-sdk-ci-release-evidence/
          if-no-files-found: error

  go-sdk-release-readiness:
    needs:
      - go-sdk
      - go-sdk-ci-release-evidence
    uses: ./.github/workflows/go-sdk-release-readiness.yml
    with:
      checkout_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      validate_synthetic_tags: true
